<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nzenda Business | Contact</title>
    <meta
      name="description"
      content="Contactez Nzenda Business pour obtenir des informations sur les produits et les commandes."
    />
    <link rel="icon" type="image/x-icon" href="../assets/pate3.jpeg" />

    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body data-base-path="../" data-page="contact">
    <div data-include="../components/header.html"></div>

    <main>
      <section class="page-hero">
        <div class="container narrow">
          <p class="eyebrow">Contact</p>
          <h1>
            Parlons de vos besoins, de vos commandes et de vos partenariats.
          </h1>
          <p class="lead-text">
            Cette page présente les moyens de contact de l'entreprise de manière
            professionnelle et facile à consulter.
          </p>
        </div>
      </section>

      <section class="page-section">
        <div class="container contact-grid">
          <div class="info-list">
            <article>
              <h3>Téléphone</h3>

              <p><a href="#">+243977973473</a></p>
            </article>
            <article>
              <h3>Email</h3>
              <p>
                <a href="mailto:nzendajoviale@gmail.com"
                  >nzendajoviale@gmail.com</a
                >
              </p>
            </article>
            <article>
              <h3>Adresse</h3>
              <p>BUTEMBO, NORD-KIVU, RDC.</p>
            </article>
          </div>

          <form class="contact-form" id="form_contact">
            <div class="field-grid">
              <input
                type="text"
                id="verify_bot"
                name="verify_bot"
                style="display: none"
                tabindex="-1"
                autocomplete="off"
              />
              <label>
                <span>Nom complet</span>
                <input
                  type="text"
                  name="nom"
                  placeholder="Votre nom"
                  required
                />
              </label>
              <label>
                <span>Téléphone</span>
                <input
                  type="text"
                  name="telephone"
                  placeholder="Votre numéro"
                  required
                />
              </label>
            </div>

            <label>
              <span>Email</span>
              <input
                type="email"
                name="email"
                placeholder="Votre email"
                required
              />
            </label>

            <label>
              <span>Message</span>
              <textarea
                rows="6"
                name="message"
                placeholder="Écrivez votre message"
                required
              ></textarea>
            </label>

            <button type="submit" class="btn btn-primary">
              Envoyer le message
            </button>
          </form>
        </div>
      </section>
    </main>
    <div data-include="../components/footer.html"></div>
    <script src="../logic/script.js"></script>
  </body>
</html>
